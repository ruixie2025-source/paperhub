upstream paperhub_frontend {
    server frontend:8080;
    keepalive 16;
}

upstream paperhub_backend {
    server backend:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;
    server_tokens off;

    auth_basic "PaperHub";
    auth_basic_user_file /run/secrets/nginx_htpasswd;

    client_max_body_size 50m;
    client_body_timeout 60s;
    send_timeout 180s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/javascript application/json image/svg+xml text/css text/plain;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /health {
        auth_basic off;
        access_log off;
        proxy_pass http://paperhub_backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(chat|papers|paper-analyses)(/|$) {
        proxy_pass http://paperhub_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }

    location /files/ {
        proxy_pass http://paperhub_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1h;
        add_header Cache-Control "private";
    }

    location = /openapi.json {
        proxy_pass http://paperhub_backend/openapi.json;
        proxy_set_header Host $host;
    }

    location ~ ^/(docs|redoc)(/|$) {
        proxy_pass http://paperhub_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://paperhub_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

