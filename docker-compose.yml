name: paperhub

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  backend:
    build:
      context: .
      target: backend
    env_file:
      - .env
    environment:
      APP_ENVIRONMENT: production
      DATABASE_PATH: /data/paperhub.db
      UPLOAD_DIR: /data/uploads
      CHROMA_DIR: /data/chroma
      MODEL_CACHE_DIR: /models
      LOG_DIR: /logs
      TRUST_PROXY_HEADERS: "true"
    expose:
      - "8000"
    volumes:
      - paperhub-data:/data
      - model-cache:/models
      - backend-logs:/logs
    restart: unless-stopped
    init: true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging

  frontend:
    build:
      context: .
      target: frontend
    expose:
      - "8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    secrets:
      - nginx_htpasswd
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

secrets:
  nginx_htpasswd:
    file: "${NGINX_HTPASSWD_FILE:-./secrets/nginx.htpasswd}"

volumes:
  paperhub-data:
  model-cache:
  backend-logs:
